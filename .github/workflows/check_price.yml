name: Hourly Domain Price Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分に実行（世界標準時UTCなので日本時間では毎時0分）
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # リポジトリへの書き込み権限を明示的に指定
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべての履歴を取得（Push時のエラー防止）

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python scraper.py

      - name: Commit and Push if changed
        run: |
          # GitHub Actions 公式ボットの設定（権限エラー回避用）
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add last_price.txt
          
          # 差分がある場合のみコミットとプッシュを実行
          if ! git diff --staged --quiet; then
            git commit -m "Update last price [skip ci]"
            git push origin main
          else
            echo "No changes detected in price. Skipping commit."
          fi
